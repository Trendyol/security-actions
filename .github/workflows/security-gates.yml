name: security-gates

on:
  workflow_call:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-gates:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      ##################################################
      # 🕵️ Gitleaks
      ##################################################
      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.22.1_linux_x64.tar.gz
          chmod +x gitleaks

      - name: Run Gitleaks
        run: |
          START=$(date +%s)
          ./gitleaks detect --report-format json --report-path gitleaks-results.json --redact || true
          ./gitleaks detect --report-format sarif --report-path gitleaks.sarif --redact || true
          END=$(date +%s)
          echo "GITLEAKS_DURATION=$((END - START))" >> $GITHUB_ENV

      ##################################################
      # 🕵️ Semgrep (Login-Free Mode)
      ##################################################
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          START=$(date +%s)
          # --config="p/default" kullanarak login gereksinimini bypass ediyoruz.
          # Hem SARIF (Dashboard için) hem JSON (Elastic için) çıktı alıyoruz.
          semgrep ci --config="p/default" --sarif --output=semgrep.sarif || true
          semgrep ci --config="p/default" --json --output=semgrep-results.json || true
          END=$(date +%s)
          echo "SEMGREP_DURATION=$((END - START))" >> $GITHUB_ENV

      ##################################################
      # 🕵️ Grype
      ##################################################
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype SBOM scan
        run: |
          START=$(date +%s)
          grype dir:. -o json > grype-results.json || true
          grype dir:. -o sarif > grype.sarif || true
          END=$(date +%s)
          echo "GRYPE_DURATION=$((END - START))" >> $GITHUB_ENV

      ##################################################
      # 📊 Dashboard & Elastic & Slack
      ##################################################
      - name: Upload Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: . # Tüm sarif dosyalarını dizinden otomatik toplar

      - name: Compute & Send Metrics
        env:
          CA_CERT: ${{ secrets.APPSEC_CA }}    
        run: |
          # Grype JSON'dan verileri çekiyoruz
          CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity=="Critical")] | length' grype-results.json || echo 0)
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity=="High")] | length' grype-results.json || echo 0)
          MEDIUM=$(jq '[.matches[] | select(.vulnerability.severity=="Medium")] | length' grype-results.json || echo 0)
          LOW=$(jq '[.matches[] | select(.vulnerability.severity=="Low")] | length' grype-results.json || echo 0)
          TOTAL=$(jq '.matches | length' grype-results.json || echo 0)

          END_TIME=$(date +%s)
          TOTAL_DURATION=$((END_TIME - START_TIME))
          echo "$CA_CERT" > trendyolrootca.crt

          PAYLOAD=$(jq -n \
            --arg timestamp "$(date --utc +'%Y-%m-%dT%H:%M:%SZ')" \
            --arg pipeline "${{ github.run_id }}" \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            --arg trigger_user "${{ github.actor }}" \
            --arg critical "$CRITICAL" \
            --arg high "$HIGH" \
            --arg medium "$MEDIUM" \
            --arg low "$LOW" \
            --arg total "$TOTAL" \
            --arg grype_duration "$GRYPE_DURATION" \
            --arg semgrep_duration "$SEMGREP_DURATION" \
            --arg gitleaks_duration "$GITLEAKS_DURATION" \
            --arg total_duration "$TOTAL_DURATION" \
            '{
              "@timestamp": $timestamp,
              "pipeline": $pipeline,
              "repository": $repo,
              "branch": $branch,
              "commit": $commit,
              "trigger_user": $trigger_user,
              "vulnerability_summary": {
                "critical": ($critical | tonumber), "high": ($high | tonumber),
                "medium": ($medium | tonumber), "low": ($low | tonumber), "total": ($total | tonumber)
              },
              "durations": {
                "grype_duration_sec": ($grype_duration | tonumber),
                "semgrep_duration_sec": ($semgrep_duration | tonumber),
                "gitleaks_duration_sec": ($gitleaks_duration | tonumber),
                "total_duration_sec": ($total_duration | tonumber)
              }
            }')

          curl -X POST "${{ secrets.APPSEC_ELASTIC_URL }}" \
            -u "${{ secrets.APPSEC_ELASTIC_USER }}:${{ secrets.APPSEC_ELASTIC_PASS }}" \
            --cacert trendyolrootca.crt \
            -H "Content-Type: application/json" -d "$PAYLOAD"

      - name: Slack Notification
        env: 
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          GITLEAKS_COUNT=$(jq '. | length' gitleaks-results.json 2>/dev/null || echo 0)
          if [ "$GITLEAKS_COUNT" -gt 0 ]; then
            MESSAGE=":rotating_light: *Gitleaks:* $GITLEAKS_COUNT bulgu bulundu! <https://github.com/${{ github.repository }}/security/code-scanning|İncele>"
            curl -X POST -H 'Content-type: application/json' --data "$(jq -n --arg text "$MESSAGE" '{text: $text}')" "$SLACK_WEBHOOK_URL"
          fi
