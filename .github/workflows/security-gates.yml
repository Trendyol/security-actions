name: security-gates

on:
  workflow_call:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-gates:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      ##################################################
      # 🕵️ Gitleaks
      ##################################################
      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.22.1_linux_x64.tar.gz
          chmod +x gitleaks

      - name: Run Gitleaks
        run: |
          START=$(date +%s)
          ./gitleaks detect --report-format sarif --report-path gitleaks.sarif --redact || true
          END=$(date +%s)
          echo "GITLEAKS_DURATION=$((END - START))" >> $GITHUB_ENV

      ##################################################
      # 🕵️ Semgrep (The "Scan" Mode)
      ##################################################
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Scan
        run: |
          START=$(date +%s)
          semgrep scan --config="p/default" --sarif --output=semgrep.sarif || true
          END=$(date +%s)
          echo "SEMGREP_DURATION=$((END - START))" >> $GITHUB_ENV

      ##################################################
      # 🕵️ Grype
      ##################################################
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype SBOM scan
        run: |
          START=$(date +%s)
          grype dir:. -o sarif > grype.sarif || true
          END=$(date +%s)
          echo "GRYPE_DURATION=$((END - START))" >> $GITHUB_ENV

      ##################################################
      # 📊 Dashboard & Elastic & Slack
      ##################################################
      - name: Upload Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .

      - name: Compute vulnerability counts
        id: vuln_count
        run: |
          # Gitleaks Kontrolü
          if [ -f gitleaks.sarif ]; then
            GITLEAKS_TOTAL=$(jq '[.runs[].results[]] | length' gitleaks.sarif || echo 0)
          else
            GITLEAKS_TOTAL=0
          fi

          # Semgrep Kontrolü
          if [ -f semgrep.sarif ]; then
            SEMGREP_TOTAL=$(jq '[.runs[].results[]] | length' semgrep.sarif || echo 0)
          else
            SEMGREP_TOTAL=0
          fi

          # Grype Kontrolü ve Severity Sayımı
          if [ -f grype.sarif ]; then
            CRITICAL=$(jq '[.runs[].results[] | select(.properties.severity == "Critical")] | length' grype.sarif || echo 0)
            HIGH=$(jq '[.runs[].results[] | select(.properties.severity == "High")] | length' grype.sarif || echo 0)
            MEDIUM=$(jq '[.runs[].results[] | select(.properties.severity == "Medium")] | length' grype.sarif || echo 0)
            LOW=$(jq '[.runs[].results[] | select(.properties.severity == "Low")] | length' grype.sarif || echo 0)
            TOTAL=$(jq '[.runs[].results[]] | length' grype.sarif || echo 0)
          else
            CRITICAL=0; HIGH=0; MEDIUM=0; LOW=0; TOTAL=0
          fi

          # Metrikleri ENV'ye basıyoruz
          echo "GITLEAKS_COUNT=$GITLEAKS_TOTAL" >> $GITHUB_ENV
          echo "SEMGREP_COUNT=$SEMGREP_TOTAL" >> $GITHUB_ENV
          echo "CRITICAL_COUNT=$CRITICAL" >> $GITHUB_ENV
          echo "HIGH_COUNT=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM_COUNT=$MEDIUM" >> $GITHUB_ENV
          echo "LOW_COUNT=$LOW" >> $GITHUB_ENV
          echo "TOTAL_COUNT=$TOTAL" >> $GITHUB_ENV

      - name: Send metrics to Elasticsearch
        env:
          CA_CERT: ${{ secrets.APPSEC_CA }}    
        run: |
          END_TIME=$(date +%s)
          TOTAL_DURATION=$((END_TIME - START_TIME))
          echo "$CA_CERT" > trendyolrootca.crt

          PAYLOAD=$(jq -n \
            --arg timestamp "$(date --utc +'%Y-%m-%dT%H:%M:%SZ')" \
            --arg pipeline "${{ github.run_id }}" \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            --arg trigger_user "${{ github.actor }}" \
            --arg critical "$CRITICAL_COUNT" \
            --arg high "$HIGH_COUNT" \
            --arg medium "$MEDIUM_COUNT" \
            --arg low "$LOW_COUNT" \
            --arg total "$TOTAL_COUNT" \
            --arg gitleaks_total "$GITLEAKS_COUNT" \
            --arg semgrep_total "$SEMGREP_COUNT" \
            --arg grype_duration "$GRYPE_DURATION" \
            --arg semgrep_duration "$SEMGREP_DURATION" \
            --arg gitleaks_duration "$GITLEAKS_DURATION" \
            --arg total_duration "$TOTAL_DURATION" \
            '{
              "@timestamp": $timestamp,
              "pipeline": $pipeline,
              "repository": $repo,
              "branch": $branch,
              "commit": $commit,
              "trigger_user": $trigger_user,
              "vulnerability_summary": {
                "critical": ($critical | tonumber), "high": ($high | tonumber),
                "medium": ($medium | tonumber), "low": ($low | tonumber), 
                "grype_total": ($total | tonumber),
                "gitleaks_total": ($gitleaks_total | tonumber),
                "semgrep_total": ($semgrep_total | tonumber)
              },
              "durations": {
                "grype_duration_sec": ($grype_duration | tonumber),
                "semgrep_duration_sec": ($semgrep_duration | tonumber),
                "gitleaks_duration_sec": ($gitleaks_duration | tonumber),
                "total_duration_sec": ($total_duration | tonumber)
              }
            }')

          curl -X POST "${{ secrets.APPSEC_ELASTIC_URL }}" \
            -u "${{ secrets.APPSEC_ELASTIC_USER }}:${{ secrets.APPSEC_ELASTIC_PASS }}" \
            --cacert trendyolrootca.crt \
            -H "Content-Type: application/json" -d "$PAYLOAD"

      - name: Slack Notification
        env: 
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # ENV'den okuyoruz
          if [ "$GITLEAKS_COUNT" -gt 0 ]; then
            MESSAGE=":rotating_light: *Gitleaks:* $GITLEAKS_COUNT bulgu bulundu! <https://github.com/${{ github.repository }}/security/code-scanning|İncele>"
            curl -X POST -H 'Content-type: application/json' --data "$(jq -n --arg text "$MESSAGE" '{text: $text}')" "$SLACK_WEBHOOK_URL"
          fi
