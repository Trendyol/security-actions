name: security-gates

on:
  workflow_call:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-gates:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Gitleaks'in farkları (new findings) anlayabilmesi için tam geçmiş şart

      - name: Set start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      ##################################################
      # 🕵️ Gitleaks (Secret Scanning)
      ##################################################
      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.22.1_linux_x64.tar.gz
          chmod +x gitleaks

      - name: Run Gitleaks
        run: |
          START=$(date +%s)
          # --log-opts=--reverse ile sadece yeni commitlere odaklanabiliriz
          # .gitleaksignore dosyanız varsa FP'ler burada elenir.
          ./gitleaks detect --report-format sarif --report-path gitleaks.sarif --redact || true
          END=$(date +%s)
          echo "GITLEAKS_DURATION=$((END - START))" >> $GITHUB_ENV

      ##################################################
      # 🕵️ Semgrep (SAST)
      ##################################################
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Scan
        run: |
          START=$(date +%s)
          semgrep scan --config="p/default" --sarif --output=semgrep.sarif || true
          END=$(date +%s)
          echo "SEMGREP_DURATION=$((END - START))" >> $GITHUB_ENV

      ##################################################
      # 🕵️ Grype (SCA)
      ##################################################
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype SBOM scan
        run: |
          START=$(date +%s)
          grype dir:. -o sarif > grype.sarif || true
          END=$(date +%s)
          echo "GRYPE_DURATION=$((END - START))" >> $GITHUB_ENV

      ##################################################
      # 📊 Metrics & SARIF Processing
      ##################################################
      - name: Upload Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .

      - name: Compute Detailed Counts
        id: vuln_count
        run: |
          # --- Gitleaks Detay (File & Line extraction for Slack) ---
          if [ -f gitleaks.sarif ]; then
            # İlk 3 bulgunun dosya ve satır bilgisini al (Örn: src/main.js:10)
            LEAK_DETAILS=$(jq -r '.runs[0].results[] | "\(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)"' gitleaks.sarif | head -n 3 | tr '\n' ' ')
            LEAKS_TOTAL=$(jq '[.runs[].results[]] | length' gitleaks.sarif || echo 0)
          else
            LEAKS_TOTAL=0; LEAK_DETAILS="N/A"
          fi

          # --- Semgrep Severity Sayımı ---
          if [ -f semgrep.sarif ]; then
            S_ERROR=$(jq '[.runs[].results[] | select(.level == "error")] | length' semgrep.sarif || echo 0)
            S_WARNING=$(jq '[.runs[].results[] | select(.level == "warning")] | length' semgrep.sarif || echo 0)
          else
            S_ERROR=0; S_WARNING=0
          fi

          # --- Grype Severity Sayımı ---
          if [ -f grype.sarif ]; then
            G_CRITICAL=$(jq '[.runs[].results[] | select(.properties.severity == "Critical")] | length' grype.sarif || echo 0)
            G_HIGH=$(jq '[.runs[].results[] | select(.properties.severity == "High")] | length' grype.sarif || echo 0)
          else
            G_CRITICAL=0; G_HIGH=0
          fi

          echo "GITLEAKS_COUNT=$LEAKS_TOTAL" >> $GITHUB_ENV
          echo "GITLEAKS_DETAILS=$LEAK_DETAILS" >> $GITHUB_ENV
          echo "S_ERROR_COUNT=$S_ERROR" >> $GITHUB_ENV
          echo "G_CRITICAL_COUNT=$G_CRITICAL" >> $GITHUB_ENV

      ##################################################
      # 🚀 Elasticsearch Metrics
      ##################################################
      - name: Send to Elastic
        env:
          CA_CERT: ${{ secrets.APPSEC_CA }}    
        run: |
          TOTAL_DURATION=$(( $(date +%s) - START_TIME ))
          echo "$CA_CERT" > trendyolrootca.crt

          PAYLOAD=$(jq -n \
            --arg timestamp "$(date --utc +'%Y-%m-%dT%H:%M:%SZ')" \
            --arg repo "${{ github.repository }}" \
            --arg commit "${{ github.sha }}" \
            --arg leaks "$GITLEAKS_COUNT" \
            --arg s_err "$S_ERROR_COUNT" \
            --arg g_crit "$G_CRITICAL_COUNT" \
            '{
              "@timestamp": $timestamp,
              "repository": $repo,
              "commit": $commit,
              "findings": {
                "gitleaks": ($leaks | tonumber),
                "semgrep_errors": ($s_err | tonumber),
                "grype_critical": ($g_crit | tonumber)
              },
              "total_duration_sec": ($total_dur | tonumber)
            }')

          curl -X POST "${{ secrets.APPSEC_ELASTIC_URL }}" \
            -u "${{ secrets.APPSEC_ELASTIC_USER }}:${{ secrets.APPSEC_ELASTIC_PASS }}" \
            --cacert trendyolrootca.crt -H "Content-Type: application/json" -d "$PAYLOAD"

      ##################################################
      # 📢 Enhanced Slack Notification (New Findings)
      ##################################################
      - name: Slack Notification
        if: env.GITLEAKS_COUNT != '0'
        env: 
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Mesaj içeriğine dosya ve satır bilgisini ekliyoruz
          MESSAGE=":rotating_light: *Yeni Gitleaks Bulgusu Tespit Edildi!*
          *Repo:* ${{ github.repository }}
          *Commit:* ${{ github.sha }}
          *Bulgu Sayısı:* $GITLEAKS_COUNT
          *Detaylar (File:Line):* \`$GITLEAKS_DETAILS\`
          <https://github.com/${{ github.repository }}/security/code-scanning|Dashboard'dan incele ve FP ise dismiss et.>"
          
          curl -X POST -H 'Content-type: application/json' --data "$(jq -n --arg text "$MESSAGE" '{text: $text}')" "$SLACK_WEBHOOK_URL"
