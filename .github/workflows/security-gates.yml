name: security-gates

on:
  workflow_call:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-gates:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      ##################################################
      # 🕵️ Araçları Çalıştır (SARIF Üretimi)
      ##################################################
      - name: Run Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz && tar -xzf gitleaks_8.22.1_linux_x64.tar.gz
          START=$(date +%s); ./gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif --redact || true; END=$(date +%s)
          echo "GITLEAKS_DURATION=$((END - START))" >> $GITHUB_ENV

      - name: Run Semgrep Scan
        run: |
          pip install semgrep
          START=$(date +%s); semgrep scan --config="p/default" --sarif --output=semgrep.sarif || true; END=$(date +%s)
          echo "SEMGREP_DURATION=$((END - START))" >> $GITHUB_ENV

      - name: Run Grype SBOM scan
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          START=$(date +%s); grype dir:. -o sarif > grype.sarif || true; END=$(date +%s)
          echo "GRYPE_DURATION=$((END - START))" >> $GITHUB_ENV

      ##################################################
      # 📊 Dashboard Yükleme (SADECE PUBLIC REPOLAR İÇİN)
      ##################################################
      - name: Upload Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        # github.event.repository.private 'false' ise public demektir.
        if: always() && github.event.repository.private == false
        with:
          sarif_file: .
          checkout_path: ${{ github.workspace }}

      ##################################################
      # 📊 Detaylı Sayım (Metrikler Her Zaman Hesaplanır)
      ##################################################
      - name: Compute vulnerability counts
        id: vuln_count
        run: |
          # --- GRYPE DETAY ---
          if [ -f grype.sarif ]; then
            G_CRIT=$(jq '[.runs[].results[] | select(.properties.severity == "Critical")] | length' grype.sarif || echo 0)
            G_HIGH=$(jq '[.runs[].results[] | select(.properties.severity == "High")] | length' grype.sarif || echo 0)
            G_MED=$(jq '[.runs[].results[] | select(.properties.severity == "Medium")] | length' grype.sarif || echo 0)
            G_LOW=$(jq '[.runs[].results[] | select(.properties.severity == "Low")] | length' grype.sarif || echo 0)
          else
            G_CRIT=0; G_HIGH=0; G_MED=0; G_LOW=0
          fi

          # --- SEMGREP DETAY ---
          if [ -f semgrep.sarif ]; then
            S_ERR=$(jq '[.runs[].results[] | select(.level == "error")] | length' semgrep.sarif || echo 0)
            S_WARN=$(jq '[.runs[].results[] | select(.level == "warning")] | length' semgrep.sarif || echo 0)
          else
            S_ERR=0; S_WARN=0
          fi

          # --- GITLEAKS DETAY ---
          if [ -f gitleaks.sarif ]; then
            LEAK_TOTAL=$(jq '[.runs[].results[]] | length' gitleaks.sarif || echo 0)
            LEAK_LOGS=$(jq -r '.runs[0].results[] | "\(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)"' gitleaks.sarif | head -n 5 | tr '\n' ' ')
          else
            LEAK_TOTAL=0; LEAK_LOGS="N/A"
          fi

          echo "G_CRITICAL=$G_CRIT" >> $GITHUB_ENV
          echo "G_HIGH=$G_HIGH" >> $GITHUB_ENV
          echo "G_MEDIUM=$G_MED" >> $GITHUB_ENV
          echo "G_LOW=$G_LOW" >> $GITHUB_ENV
          echo "S_ERROR=$S_ERR" >> $GITHUB_ENV
          echo "S_WARNING=$S_WARN" >> $GITHUB_ENV
          echo "LEAKS_COUNT=$LEAK_TOTAL" >> $GITHUB_ENV
          echo "LEAKS_DETAILS=$LEAK_LOGS" >> $GITHUB_ENV

      ##################################################
      # 🚀 Elasticsearch Metrikleri (Her Zaman Gönderilir)
      ##################################################
      - name: Send to Elastic
        env:
          CA_CERT: ${{ secrets.APPSEC_CA }}    
        run: |
          TOTAL_DURATION=$(( $(date +%s) - START_TIME ))
          echo "$CA_CERT" > trendyolrootca.crt

          PAYLOAD=$(jq -n \
            --arg timestamp "$(date --utc +'%Y-%m-%dT%H:%M:%SZ')" \
            --arg repo "${{ github.repository }}" \
            --arg commit "${{ github.sha }}" \
            --arg actor "${{ github.actor }}" \
            --arg g_crit "$G_CRITICAL" --arg g_high "$G_HIGH" --arg g_med "$G_MEDIUM" --arg g_low "$G_LOW" \
            --arg s_err "$S_ERROR" --arg s_warn "$S_WARNING" \
            --arg leaks "$LEAKS_COUNT" \
            --arg total_dur "$TOTAL_DURATION" \
            '{
              "@timestamp": $timestamp,
              "repository": $repo,
              "commit": $commit,
              "trigger_user": $actor,
              "visibility": (if "${{ github.event.repository.private }}" == "true" then "private" else "public" end),
              "vulnerability_details": {
                "grype": { "critical": ($g_crit | tonumber), "high": ($g_high | tonumber), "medium": ($g_med | tonumber), "low": ($g_low | tonumber) },
                "semgrep": { "error": ($s_err | tonumber), "warning": ($s_warn | tonumber) },
                "gitleaks_total": ($leaks | tonumber)
              },
              "total_duration_sec": ($total_dur | tonumber)
            }')

          curl -X POST "${{ secrets.APPSEC_ELASTIC_URL }}" \
            -u "${{ secrets.APPSEC_ELASTIC_USER }}:${{ secrets.APPSEC_ELASTIC_PASS }}" \
            --cacert trendyolrootca.crt -H "Content-Type: application/json" -d "$PAYLOAD"

      ##################################################
      # 📢 Slack Notification
      ##################################################
      - name: Slack Notification
        if: env.LEAKS_COUNT != '0'
        env: 
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MESSAGE=":rotating_light: *Gitleaks Bulgusu Tespit Edildi!*
          *Repo:* ${{ github.repository }}
          *Bulgu Sayısı:* $LEAKS_COUNT
          *Konumlar:* \`$LEAKS_DETAILS\`"
          
          # Private repolarda dashboard linki çalışmayabileceği için mesajı ona göre düzenleyebilirsin
          curl -X POST -H 'Content-type: application/json' --data "$(jq -n --arg text "$MESSAGE" '{text: $text}')" "$SLACK_WEBHOOK_URL"
